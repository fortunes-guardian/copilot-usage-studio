name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to release or repair, for example v0.1.0
        required: true
        type: string

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish npm, VS Code Marketplace, and GitHub Release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js and npm registry
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use an OIDC-capable npm version
        run: npm install --global "npm@^11.5.1"

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches all package versions
        shell: bash
        run: |
          if [[ "$RELEASE_TAG" != v* ]]; then
            echo "Release tag must start with v; received $RELEASE_TAG."
            exit 1
          fi

          package_version="$(node -p "require('./package.json').version")"
          extension_version="$(node -p "require('./vscode-extension/package.json').version")"
          tag_version="${RELEASE_TAG#v}"

          if [[ "$package_version" != "$tag_version" ]]; then
            echo "Tag $RELEASE_TAG does not match package.json version $package_version."
            exit 1
          fi
          if [[ "$extension_version" != "$tag_version" ]]; then
            echo "Tag $RELEASE_TAG does not match vscode-extension/package.json version $extension_version."
            exit 1
          fi


      - name: Check npm publication state
        id: npm-state
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          release_commit="$(git rev-parse HEAD)"

          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            published_git_head="$(npm view "$package_name@$package_version" gitHead)"

            if [[ -z "$published_git_head" || "$published_git_head" != "$release_commit" ]]; then
              echo "$package_name@$package_version already exists on npm from a different or unverifiable commit."
              exit 1
            fi

            echo "$package_name@$package_version is already published from this exact commit; continuing safely."
            echo "already-published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already-published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run release gate
        run: npm run release:check && npm run vscode:verify

      - name: Package VS Code extension
        run: npm run vscode:package

      - name: Publish to npm
        if: steps.npm-state.outputs.already-published != 'true'
        run: npm publish --access public

      - name: Publish VS Code extension to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          if [[ -z "$VSCE_PAT" ]]; then
            echo "Repository secret VSCE_PAT is required for Marketplace publication."
            exit 1
          fi

          vsix_asset="$(ls tmp/*.vsix | head -n 1)"
          node node_modules/@vscode/vsce/vsce publish \
            --packagePath "$vsix_asset" \
            --skip-duplicate

      - name: Generate release notes
        run: npm run release:notes -- --tag "$RELEASE_TAG" --out tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          vsix_asset="$(ls tmp/*.vsix | head -n 1)"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub Release $RELEASE_TAG already exists."
            gh release edit "$RELEASE_TAG" --notes-file tmp/release-notes.md
            gh release upload "$RELEASE_TAG" "$vsix_asset" --clobber
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --notes-file tmp/release-notes.md \
            --title "Copilot Usage Studio $RELEASE_TAG" \
            "$vsix_asset"
